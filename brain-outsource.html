<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>大腦外包系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0f0e17;
      --surface:  #1d1c28;
      --surface2: #252438;
      --border:   rgba(255,255,255,0.07);
      --text:     #e2ddd8;
      --dim:      #7a7590;
      --red:      #c95c4e;
      --gold:     #d4a843;
      --green:    #6ea88a;
      --blue:     #60a5fa;
      --circ:     326.7;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Noto Sans JP','PingFang TC',system-ui,sans-serif;
      min-height:100vh;
    }
    /* ── TIMER ── */
    #timer-panel{overflow:hidden;max-height:0;transition:max-height 0.42s cubic-bezier(0.16,1,0.3,1);}
    #timer-panel.open{max-height:380px;}
    #timer-progress{
      stroke:var(--gold);
      stroke-dasharray:326.7;stroke-dashoffset:0;
      transition:stroke-dashoffset 1s linear,stroke 0.5s;
    }
    #timer-progress.urgent{stroke:var(--red);}
    .t-preset{
      padding:5px 14px;border-radius:999px;
      border:1px solid var(--border);font-size:12px;
      color:var(--dim);background:transparent;cursor:pointer;
      transition:all 0.15s;font-family:inherit;
    }
    .t-preset:hover,.t-preset.on{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,0.08);}
    /* ── INPUT ── */
    #brain-input{
      background:var(--surface);border:1px solid var(--border);
      border-radius:14px;padding:16px 18px 32px;
      font-size:15px;color:var(--text);font-family:inherit;
      width:100%;resize:none;line-height:1.65;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    #brain-input:focus{outline:none;border-color:rgba(212,168,67,0.35);box-shadow:0 0 0 3px rgba(212,168,67,0.07);}
    .imp-btn{
      padding:5px 14px;border-radius:999px;
      border:1px solid var(--border);font-size:12px;
      color:var(--dim);background:transparent;cursor:pointer;
      transition:all 0.15s;font-family:inherit;
    }
    .imp-btn[data-v="high"].on{border-color:var(--red);color:var(--red);background:rgba(201,92,78,0.08);}
    .imp-btn[data-v="normal"].on{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,0.08);}
    .imp-btn[data-v="low"].on{border-color:var(--dim);color:var(--dim);background:rgba(122,117,144,0.1);}
    /* ── CONFIRM CARD ── */
    #confirm-card{
      display:none;background:var(--surface);
      border:1px solid rgba(212,168,67,0.22);border-radius:14px;
      padding:16px 18px;margin-bottom:14px;
    }
    /* ── TASK CARDS ── */
    @keyframes cIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes cOut{
      0%{opacity:1;transform:translateX(0);max-height:300px;margin-bottom:10px;padding:16px 18px;}
      50%{opacity:0;transform:translateX(-22px);}
      100%{opacity:0;transform:translateX(-22px);max-height:0;margin-bottom:0;padding:0;}
    }
    .task-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:14px;padding:16px 18px;margin-bottom:10px;
      display:flex;align-items:flex-start;gap:14px;
      animation:cIn 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .task-card.out{animation:cOut 0.45s ease-in forwards;overflow:hidden;pointer-events:none;}
    .chk{
      width:36px;height:36px;border-radius:50%;flex-shrink:0;
      border:1.5px solid rgba(255,255,255,0.13);background:transparent;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,0.18);transition:all 0.15s;margin-top:2px;
    }
    .chk:hover{border-color:var(--green);background:rgba(110,168,138,0.1);color:var(--green);transform:scale(1.1);}
    /* badges */
    .cb{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:999px;}
    .cb.r{background:rgba(212,168,67,0.12);color:var(--gold);}
    .cb.e{background:rgba(110,168,138,0.12);color:var(--green);}
    .cb.m{background:rgba(96,165,250,0.12);color:var(--blue);}
    .ib{display:inline-flex;font-size:10px;padding:2px 7px;border-radius:999px;}
    .ib.hi{background:rgba(201,92,78,0.14);color:var(--red);}
    .ib.lo{background:rgba(122,117,144,0.14);color:var(--dim);}
    /* ── SHEETS ── */
    #backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,0.65);
      opacity:0;pointer-events:none;transition:opacity 0.3s;
      z-index:40;backdrop-filter:blur(2px);
    }
    #backdrop.on{opacity:1;pointer-events:auto;}
    .sheet{
      position:fixed;bottom:0;left:0;right:0;background:#1a1928;
      border-radius:20px 20px 0 0;max-height:82vh;
      transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.16,1,0.3,1);
      z-index:50;display:flex;flex-direction:column;
      border-top:1px solid rgba(255,255,255,0.07);
    }
    .sheet.on{transform:translateY(0);}
    .handle{width:36px;height:4px;background:rgba(255,255,255,0.11);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
    .scroll{overflow-y:auto;flex:1;padding:0 16px 40px;}
    /* inbox items */
    .ii{
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:14px 16px;margin-bottom:8px;
    }
    .ii.ex{border-color:rgba(212,168,67,0.18);}
    .cs-btn{
      flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);
      background:transparent;cursor:pointer;font-size:11px;color:var(--dim);
      transition:all 0.15s;font-family:inherit;line-height:1.4;
    }
    .cs-btn:hover{border-color:var(--gold);color:var(--text);}
    .cs-btn.on{border-color:var(--gold);background:rgba(212,168,67,0.08);color:var(--gold);}
    /* journal */
    .jd{font-size:11px;color:var(--dim);letter-spacing:0.04em;padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;}
    .ji{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
    /* micro toast */
    #micro-toast{
      position:fixed;bottom:80px;left:50%;
      transform:translateX(-50%) translateY(16px);
      background:rgba(96,165,250,0.13);border:1px solid rgba(96,165,250,0.28);
      border-radius:12px;padding:12px 20px;font-size:13px;color:#93c5fd;
      opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;
      z-index:60;white-space:nowrap;
    }
    #micro-toast.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
    /* misc */
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
    .pulse{animation:pulse 2.5s ease-in-out infinite;}
    input[type=date],input[type=number]{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:6px 10px;font-size:13px;
      color:var(--text);font-family:inherit;outline:none;
    }
    input[type=date]:focus,input[type=number]:focus{border-color:rgba(212,168,67,0.3);}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px;}
    .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .pill-btn{
      padding:5px 14px;border-radius:999px;font-size:12px;
      border:1px solid var(--border);color:var(--dim);
      background:transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;
    }
    .pill-btn:hover{border-color:var(--gold);color:var(--gold);}
    .icon-btn{
      background:transparent;border:none;color:var(--dim);
      font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;
    }
    .gold-btn{
      padding:10px;border-radius:10px;font-size:13px;cursor:pointer;
      background:rgba(110,168,138,0.1);border:1px solid rgba(110,168,138,0.22);
      color:var(--green);font-family:inherit;
    }
    .ghost-btn{
      padding:10px 18px;border-radius:10px;font-size:13px;cursor:pointer;
      background:transparent;border:1px solid var(--border);
      color:var(--dim);font-family:inherit;
    }
  </style>
</head>
<body>

<!-- BACKDROP -->
<div id="backdrop" onclick="closeSheets()"></div>

<!-- ══ HEADER ══ -->
<div style="max-width:560px;margin:0 auto;padding:22px 18px 0;">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:18px;font-weight:700;letter-spacing:-0.2px;color:#ede9e0;">🧠 大腦外包系統</div>
      <div style="font-size:11px;color:var(--dim);margin-top:3px;">把念頭丟出來，讓它等你，你去休息</div>
    </div>
    <button id="t-toggle" onclick="toggleTimer()"
      style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--dim);font-family:inherit;transition:all 0.15s;">
      🍅 番茄鐘
    </button>
  </div>
</div>

<!-- ══ TIMER PANEL ══ -->
<div id="timer-panel" style="max-width:560px;margin:0 auto;padding:0 18px;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 18px;margin-top:14px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">

      <!-- SVG -->
      <svg width="148" height="148" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="var(--surface2)" stroke-width="5"/>
        <circle id="timer-progress" cx="60" cy="60" r="52" fill="none" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="0"
          transform="rotate(-90 60 60)"/>
        <text id="t-time" x="60" y="56" text-anchor="middle" dominant-baseline="middle"
          style="font-size:22px;font-weight:700;fill:#ede9e0;font-family:'Noto Sans JP',sans-serif;">25:00</text>
        <text id="t-label" x="60" y="75" text-anchor="middle"
          style="font-size:10px;fill:var(--dim);font-family:'Noto Sans JP',sans-serif;">準備開始</text>
      </svg>

      <!-- Presets -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        <button class="t-preset on" data-m="25" onclick="setPreset(this)">🍅 25分</button>
        <button class="t-preset" data-m="15" onclick="setPreset(this)">🌙 15分</button>
        <button class="t-preset" data-m="5"  onclick="setPreset(this)">🌿 5分</button>
        <button class="t-preset" data-m="0"  onclick="setPreset(this)">✏ 自訂</button>
      </div>

      <!-- Custom input -->
      <div id="t-custom" style="display:none;align-items:center;gap:8px;">
        <input type="number" id="t-mins" min="1" max="120" value="30"
          style="width:68px;text-align:center;">
        <span style="font-size:13px;color:var(--dim);">分鐘</span>
        <button onclick="applyCustom()"
          style="padding:6px 14px;border-radius:8px;background:rgba(212,168,67,0.1);border:1px solid var(--gold);color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit;">確認</button>
      </div>

      <!-- Controls -->
      <div style="display:flex;gap:10px;">
        <button id="t-start" onclick="toggleTimer2()"
          style="padding:9px 28px;border-radius:999px;background:var(--gold);color:#1a1509;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;">
          ▶ 開始
        </button>
        <button onclick="resetTimer()"
          style="padding:9px 18px;border-radius:999px;background:transparent;border:1px solid var(--border);color:var(--dim);font-size:13px;cursor:pointer;font-family:inherit;">
          ↺ 重設
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div style="max-width:560px;margin:0 auto;padding:18px 18px 120px;">

  <!-- INPUT -->
  <div style="position:relative;margin-bottom:10px;">
    <textarea id="brain-input" rows="3"
      placeholder="現在大腦想到什麼？"></textarea>
    <span class="pulse" style="position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--dim);pointer-events:none;">Shift↵ 換行</span>
  </div>

  <!-- Options row -->
  <div class="row" style="margin-bottom:10px;">
    <button class="imp-btn" data-v="high" onclick="setImp(this)">‼ 重要</button>
    <button class="imp-btn on" data-v="normal" onclick="setImp(this)">！普通</button>
    <button class="imp-btn" data-v="low" onclick="setImp(this)">○ 備忘</button>
    <button id="dl-toggle" class="pill-btn" onclick="toggleDl()">+ 截止日</button>
    <input type="date" id="dl-input" style="display:none;">
  </div>

  <!-- Submit -->
  <button onclick="submitInput()"
    style="width:100%;padding:12px;border-radius:12px;background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.22);color:var(--gold);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:0.02em;margin-bottom:14px;transition:all 0.15s;">
    送出 → 確認修訂
  </button>

  <!-- CONFIRM CARD -->
  <div id="confirm-card">
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span>確認這條要存入嗎？</span>
      <span id="c-imp"></span>
      <span id="c-dl"></span>
    </div>
    <div id="c-text" style="font-size:16px;color:var(--text);line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-bottom:14px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="gold-btn" style="flex:1;" onclick="confirmAdd()">✓ 確認存入</button>
      <button class="ghost-btn" onclick="cancelConfirm()">← 修改</button>
    </div>
  </div>

  <!-- TASK LIST -->
  <div id="task-list"></div>

  <!-- INBOX BAR -->
  <div id="inbox-bar" style="text-align:center;margin-top:4px;display:none;">
    <button onclick="openSheet('inbox')"
      style="display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:999px;background:transparent;border:1px solid var(--border);font-size:12px;color:var(--dim);cursor:pointer;font-family:inherit;">
      📥 <span id="ib-text"></span> <span style="font-size:10px;opacity:0.55;">→ 查看全部</span>
    </button>
  </div>

  <!-- EMPTY STATE -->
  <div id="empty" style="text-align:center;padding:48px 0;display:none;">
    <div style="font-size:44px;margin-bottom:12px;opacity:0.7;">✨</div>
    <div style="font-size:14px;color:var(--dim);">大腦清空了。<br>現在的你很輕盈。</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div style="position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;padding:16px;background:linear-gradient(to top,var(--bg) 55%,transparent);pointer-events:none;">
  <button onclick="openSheet('journal')"
    style="pointer-events:auto;display:flex;align-items:center;gap:8px;padding:10px 22px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:13px;color:var(--dim);cursor:pointer;font-family:inherit;">
    📖 查看日誌
  </button>
</div>

<!-- ══ INBOX SHEET ══ -->
<div id="inbox-sheet" class="sheet">
  <div class="handle"></div>
  <div style="padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="font-size:15px;font-weight:600;">📥 收件匣</div>
    <button class="icon-btn" onclick="closeSheets()">×</button>
  </div>
  <div class="scroll"><div id="inbox-list"></div></div>
</div>

<!-- ══ JOURNAL SHEET ══ -->
<div id="journal-sheet" class="sheet">
  <div class="handle"></div>
  <div style="padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="font-size:15px;font-weight:600;">📖 完成日誌</div>
    <button class="icon-btn" onclick="closeSheets()">×</button>
  </div>
  <div class="scroll"><div id="journal-list"></div></div>
</div>

<!-- MICRO TOAST -->
<div id="micro-toast">
  ⚡ 微型小步！2 分鐘內，<u style="cursor:pointer;" onclick="hideMicro()">立刻去做掉它！</u>
</div>

<script>
// ── DATA ──
const TK = 'bov2-tasks', DK = 'bov2-done';
let tasks=[], done=[], pending=null, curImp='normal', dlOn=false;

function load(){
  try{tasks=JSON.parse(localStorage.getItem(TK)||'[]');}catch{tasks=[];}
  try{done =JSON.parse(localStorage.getItem(DK)||'[]');}catch{done=[];}
}
function save(){
  localStorage.setItem(TK,JSON.stringify(tasks));
  localStorage.setItem(DK,JSON.stringify(done));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ── RENDER MAIN ──
function renderMain(){
  const lEl=$('task-list'), bEl=$('inbox-bar'), eEl=$('empty'), ibT=$('ib-text');
  lEl.innerHTML='';
  if(!tasks.length){eEl.style.display='';bEl.style.display='none';return;}
  eEl.style.display='none';

  tasks.slice(0,3).forEach(t=>{
    const c=document.createElement('div');
    c.className='task-card';c.dataset.id=t.id;
    let badges='';
    if(t.imp==='high') badges+=`<span class="ib hi">‼ 重要</span> `;
    if(t.imp==='low')  badges+=`<span class="ib lo">備忘</span> `;
    if(t.cat==='r') badges+=`<span class="cb r">🚀 火箭</span> `;
    if(t.cat==='e') badges+=`<span class="cb e">🛒 雜務</span> `;
    if(t.cat==='m') badges+=`<span class="cb m">⚡ 微型</span> `;
    let dl='';
    if(t.dl){const ov=new Date(t.dl)<new Date();dl=`<span style="font-size:11px;color:${ov?'var(--red)':'var(--dim)'}">${ov?'⚠ 已過期 ':'📅 '}${t.dl}</span>`;}
    c.innerHTML=`
      <button class="chk" data-id="${t.id}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <div style="flex:1;min-width:0;">
        <div style="font-size:16px;color:var(--text);line-height:1.65;white-space:pre-wrap;word-break:break-word;">${esc(t.text)}</div>
        ${badges||dl?`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px;">${badges}${dl}</div>`:''}
      </div>`;
    lEl.appendChild(c);
  });

  const h=Math.max(0,tasks.length-3);
  ibT.textContent=h>0?`還有 ${h} 件躺在收件匣`:`共 ${tasks.length} 件・打開收件匣`;
  bEl.style.display='';
}

// ── RENDER INBOX ──
function renderInbox(){
  const el=$('inbox-list');
  if(!tasks.length){el.innerHTML=`<div style="text-align:center;padding:32px;color:var(--dim);font-size:13px;">收件匣是空的 ✨</div>`;return;}
  el.innerHTML='';
  tasks.forEach(t=>{
    const item=document.createElement('div');
    item.className='ii';item.dataset.id=t.id;
    const impH=t.imp==='high'?`<span class="ib hi">‼ 重要</span>`:(t.imp==='low'?`<span class="ib lo">備忘</span>`:'');
    const dlH=t.dl?`<span style="font-size:11px;color:var(--dim)">📅 ${t.dl}</span>`:'';
    const catLabel=t.cat?` <span class="cb ${t.cat}">${t.cat==='r'?'🚀 火箭':t.cat==='e'?'🛒 雜務':'⚡ 微型'}</span>`:'';
    item.innerHTML=`
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <button class="chk" style="flex-shrink:0;margin-top:1px;" onclick="completeFromInbox('${t.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <div style="flex:1;min-width:0;">
          <div id="itxt-${t.id}" style="font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;">${esc(t.text)}</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap;">
            ${impH}${dlH}${catLabel}
            <button onclick="toggleExpand('${t.id}')" class="pill-btn" style="padding:2px 10px;font-size:11px;">
              ${t.cat?'✎ 改分類':'+ 分類'}
            </button>
            <button onclick="editInbox('${t.id}')" class="pill-btn" style="padding:2px 10px;font-size:11px;">✎ 編輯</button>
            <button onclick="deleteInbox('${t.id}')" class="pill-btn" style="padding:2px 10px;font-size:11px;color:var(--red);border-color:rgba(201,92,78,0.2);">🗑 刪除</button>
          </div>
        </div>
      </div>
      <div id="cs-${t.id}" style="display:none;margin-top:12px;">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px;">選擇能量屬性：</div>
        <div style="display:flex;gap:8px;">
          <button class="cs-btn${t.cat==='r'?' on':''}" onclick="setCat('${t.id}','r')">🚀 火箭任務<br><span style="font-size:10px;opacity:0.6;">高專注・今天1個</span></button>
          <button class="cs-btn${t.cat==='e'?' on':''}" onclick="setCat('${t.id}','e')">🛒 雜務<br><span style="font-size:10px;opacity:0.6;">批次・下午做</span></button>
          <button class="cs-btn${t.cat==='m'?' on':''}" onclick="setCat('${t.id}','m')">⚡ 微型小步<br><span style="font-size:10px;opacity:0.6;">2分鐘・立刻</span></button>
        </div>
      </div>`;
    el.appendChild(item);
  });
}

// ── RENDER JOURNAL ──
function renderJournal(){
  const el=$('journal-list');
  if(!done.length){el.innerHTML=`<div style="text-align:center;padding:32px;color:var(--dim);font-size:13px;">還沒有完成記錄。<br>去做完一件事吧！</div>`;return;}
  const sorted=[...done].sort((a,b)=>b.completedAt-a.completedAt);
  const groups={};const now=new Date();const yday=new Date(now);yday.setDate(now.getDate()-1);
  sorted.forEach(t=>{
    const d=new Date(t.completedAt);
    const lbl=d.toDateString()===now.toDateString()?'今天':d.toDateString()===yday.toDateString()?'昨天':`${d.getMonth()+1}/${d.getDate()}`;
    if(!groups[lbl])groups[lbl]=[];
    groups[lbl].push(t);
  });
  el.innerHTML='';
  Object.entries(groups).forEach(([date,items])=>{
    const dd=document.createElement('div');dd.className='jd';dd.textContent=`── ${date}（${items.length} 件）`;el.appendChild(dd);
    items.forEach(t=>{
      const row=document.createElement('div');row.className='ji';
      const catB=t.cat?`<span class="cb ${t.cat}" style="font-size:10px;">${t.cat==='r'?'🚀':t.cat==='e'?'🛒':'⚡'}</span>`:'';
      const tm=new Date(t.completedAt).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
      row.innerHTML=`
        <span style="color:var(--green);flex-shrink:0;margin-top:2px;">✓</span>
        <div style="flex:1;min-width:0;">
          <div id="jtxt-${t.id}" style="font-size:14px;color:var(--text);line-height:1.55;word-break:break-word;">${esc(t.text)}</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap;">
            ${catB}
            <span style="font-size:11px;color:var(--dim);">${tm}</span>
            <button onclick="editJournal('${t.id}')" class="pill-btn" style="padding:1px 8px;font-size:11px;">✎</button>
            <button onclick="deleteJournal('${t.id}')" class="pill-btn" style="padding:1px 8px;font-size:11px;color:var(--red);border-color:rgba(201,92,78,0.2);">🗑</button>
          </div>
        </div>`;
      el.appendChild(row);
    });
  });
}

// ── INBOX EDIT / DELETE ──
function deleteInbox(id){
  tasks=tasks.filter(x=>x.id!==id);
  save();renderMain();renderInbox();
}
function editInbox(id){
  const wrap=document.getElementById(`itxt-${id}`);
  const t=tasks.find(x=>x.id===id);
  if(!wrap||!t)return;
  const ta=document.createElement('textarea');
  ta.id=`iedit-${id}`;ta.value=t.text;ta.rows=3;
  ta.style.cssText='width:100%;background:var(--surface2);border:1px solid rgba(212,168,67,0.3);border-radius:8px;padding:8px;font-size:14px;color:var(--text);font-family:inherit;resize:none;outline:none;line-height:1.6;box-sizing:border-box;';
  const btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:8px;margin-top:8px;';
  btns.innerHTML=`
    <button onclick="saveInboxEdit('${id}')" style="padding:5px 14px;border-radius:8px;background:rgba(110,168,138,0.12);border:1px solid rgba(110,168,138,0.25);color:var(--green);font-size:12px;cursor:pointer;font-family:inherit;">儲存</button>
    <button onclick="renderInbox()" style="padding:5px 12px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--dim);font-size:12px;cursor:pointer;font-family:inherit;">取消</button>`;
  wrap.innerHTML='';wrap.appendChild(ta);wrap.appendChild(btns);
  ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
}
function saveInboxEdit(id){
  const ta=document.getElementById(`iedit-${id}`);
  if(!ta)return;
  const v=ta.value.trim();if(!v)return;
  const t=tasks.find(x=>x.id===id);
  if(t){t.text=v;save();}
  renderInbox();renderMain();
}

// ── JOURNAL EDIT / DELETE ──
function deleteJournal(id){
  done=done.filter(x=>x.id!==id);
  save();renderJournal();
}
function editJournal(id){
  const wrap=document.getElementById(`jtxt-${id}`);
  const t=done.find(x=>x.id===id);
  if(!wrap||!t)return;
  const ta=document.createElement('textarea');
  ta.id=`jedit-${id}`;ta.value=t.text;ta.rows=3;
  ta.style.cssText='width:100%;background:var(--surface2);border:1px solid rgba(212,168,67,0.3);border-radius:8px;padding:8px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;line-height:1.6;box-sizing:border-box;';
  const btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:8px;margin-top:8px;';
  btns.innerHTML=`
    <button onclick="saveJournalEdit('${id}')" style="padding:5px 14px;border-radius:8px;background:rgba(110,168,138,0.12);border:1px solid rgba(110,168,138,0.25);color:var(--green);font-size:12px;cursor:pointer;font-family:inherit;">儲存</button>
    <button onclick="renderJournal()" style="padding:5px 12px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--dim);font-size:12px;cursor:pointer;font-family:inherit;">取消</button>`;
  wrap.innerHTML='';wrap.appendChild(ta);wrap.appendChild(btns);
  ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
}
function saveJournalEdit(id){
  const ta=document.getElementById(`jedit-${id}`);
  if(!ta)return;
  const v=ta.value.trim();if(!v)return;
  const t=done.find(x=>x.id===id);
  if(t){t.text=v;save();}
  renderJournal();
}

// ── TASK ACTIONS ──
function completeTask(id){
  const c=document.querySelector(`.task-card[data-id="${id}"]`);
  if(!c||c.classList.contains('out'))return;
  c.classList.add('out');
  setTimeout(()=>{
    const t=tasks.find(x=>x.id===id);
    if(t){done.push({...t,completedAt:Date.now()});tasks=tasks.filter(x=>x.id!==id);save();renderMain();}
  },450);
}
function completeFromInbox(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  done.push({...t,completedAt:Date.now()});tasks=tasks.filter(x=>x.id!==id);
  save();renderMain();renderInbox();
  if(!tasks.length)closeSheets();
}
function setCat(id,cat){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.cat=cat;save();renderMain();renderInbox();
  if(cat==='m')showMicro();
}
function toggleExpand(id){
  const el=document.getElementById(`cs-${id}`);
  const item=document.querySelector(`.ii[data-id="${id}"]`);
  if(!el)return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'';
  if(item)item.classList.toggle('ex',!open);
}

// ── INPUT FLOW ──
function setImp(btn){
  document.querySelectorAll('.imp-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');curImp=btn.dataset.v;
}
function toggleDl(){
  dlOn=!dlOn;
  $('dl-input').style.display=dlOn?'':'none';
  $('dl-toggle').textContent=dlOn?'✕ 移除':'+ 截止日';
  if(!dlOn)$('dl-input').value='';
}
function submitInput(){
  const text=$('brain-input').value.trim();
  if(!text){$('brain-input').focus();return;}
  const dl=$('dl-input').value||null;
  pending={text,imp:curImp,dl};
  $('c-text').textContent=text;
  $('c-imp').innerHTML=curImp==='high'?`<span class="ib hi">‼ 重要</span>`:curImp==='low'?`<span class="ib lo">備忘</span>`:'';
  $('c-dl').innerHTML=dl?`<span style="font-size:11px;color:var(--dim)">📅 ${dl}</span>`:'';
  $('confirm-card').style.display='block';
  $('brain-input').blur();
}
function confirmAdd(){
  if(!pending)return;
  tasks.push({id:uid(),text:pending.text,imp:pending.imp,dl:pending.dl,cat:null,createdAt:Date.now()});
  save();renderMain();
  $('brain-input').value='';
  if(dlOn)toggleDl();
  document.querySelectorAll('.imp-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.imp-btn[data-v="normal"]').classList.add('on');
  curImp='normal';
  $('confirm-card').style.display='none';pending=null;
  $('brain-input').focus();
}
function cancelConfirm(){
  if(pending)$('brain-input').value=pending.text;
  $('confirm-card').style.display='none';pending=null;
  $('brain-input').focus();
}

// ── EVENTS ──
$('brain-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitInput();}
});
$('task-list').addEventListener('click',e=>{
  const b=e.target.closest('.chk');if(b)completeTask(b.dataset.id);
});

// ── SHEETS ──
function openSheet(w){
  $('backdrop').classList.add('on');
  if(w==='inbox'){renderInbox();$('inbox-sheet').classList.add('on');}
  else{renderJournal();$('journal-sheet').classList.add('on');}
}
function closeSheets(){
  $('backdrop').classList.remove('on');
  $('inbox-sheet').classList.remove('on');
  $('journal-sheet').classList.remove('on');
}

// ── MICRO TOAST ──
let mT;
function showMicro(){
  const el=$('micro-toast');el.classList.add('on');
  clearTimeout(mT);mT=setTimeout(()=>el.classList.remove('on'),5500);
}
function hideMicro(){$('micro-toast').classList.remove('on');}

// ── TIMER ──
const CIRC=326.7;
let tTotal=25*60,tRem=25*60,tRunning=false,tInterval=null;

function toggleTimer(){
  const p=$('timer-panel'),b=$('t-toggle');
  const open=p.classList.toggle('open');
  b.style.borderColor=open?'var(--gold)':'';
  b.style.color=open?'var(--gold)':'';
}
function setPreset(btn){
  document.querySelectorAll('.t-preset').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const m=btn.dataset.m;
  $('t-custom').style.display=m==='0'?'flex':'none';
  if(m!=='0'){resetTimer();tTotal=parseInt(m)*60;tRem=tTotal;updateT();}
}
function applyCustom(){
  const m=Math.max(1,Math.min(120,parseInt($('t-mins').value)||25));
  resetTimer();tTotal=m*60;tRem=tTotal;updateT();
}
function toggleTimer2(){
  if(tRunning){
    clearInterval(tInterval);tInterval=null;tRunning=false;
    $('t-start').textContent='▶ 繼續';$('t-label').textContent='暫停中';
  } else {
    if(tRem===0)resetTimer();
    tRunning=true;$('t-start').textContent='⏸ 暫停';$('t-label').textContent='專注中';
    tInterval=setInterval(()=>{
      tRem--;updateT();
      if(tRem<=0){
        clearInterval(tInterval);tInterval=null;tRunning=false;
        $('t-start').textContent='▶ 再來一次';$('t-label').textContent='完成！';
        bell();
      }
    },1000);
  }
}
function resetTimer(){
  clearInterval(tInterval);tInterval=null;tRunning=false;tRem=tTotal;
  $('t-start').textContent='▶ 開始';$('t-label').textContent='準備開始';
  $('timer-progress').classList.remove('urgent');updateT();
}
function updateT(){
  const m=Math.floor(tRem/60),s=tRem%60;
  $('t-time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const prog=tTotal>0?tRem/tTotal:0;
  $('timer-progress').style.strokeDashoffset=CIRC*(1-prog);
  if(prog<0.2&&tRunning)$('timer-progress').classList.add('urgent');
  else $('timer-progress').classList.remove('urgent');
}
function bell(){
  try{
    const ctx=new AudioContext();
    [0,0.45,0.9].forEach(d=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=660;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(0.22,ctx.currentTime+d+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+1.1);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+1.1);
    });
  }catch(e){}
}

// ── UTIL ──
function $(id){return document.getElementById(id);}

// ── MIGRATE v1 → v2 ──
function migrateV1(){
  const OLD='brain-outsource-v1';
  const raw=localStorage.getItem(OLD);
  if(!raw)return;
  try{
    const old=JSON.parse(raw)||[];
    if(!old.length)return;
    // 只在 v2 是空的時才搬（避免覆蓋新資料）
    const existing=JSON.parse(localStorage.getItem(TK)||'[]');
    if(!existing.length){
      // 補上 v2 需要的欄位
      tasks=old.map(t=>({
        id:t.id||uid(),
        text:t.text||'',
        imp:t.importance||'normal',
        dl:t.deadline||null,
        cat:t.category||null,
        createdAt:t.createdAt||t.at||Date.now()
      }));
      save();
      localStorage.removeItem(OLD);
    }
  }catch(e){}
}

// ── INIT ──
migrateV1();load();renderMain();updateT();
$('brain-input').focus();
